set -sg escape-time 0
set -g base-index 1
set -g mouse on
set -g history-limit 50000

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Domino Still Life palette
set -g status-style "bg=#1d1b13,fg=#c8bd98"
set -g status-left "#[bg=#9b7632,fg=#0c0c0c,bold] #S #[bg=#1d1b13,fg=#9b7632]"
set -g status-left-length 30
set -g status-right "#[fg=#6f6a52]%Y-%m-%d #[fg=#f3ead0]%H:%M "
set -g window-status-format "#[fg=#7f8466] #I:#W "
set -g window-status-current-format "#[bg=#7b3428,fg=#f3ead0,bold] #I:#W "
set -g pane-border-style "fg=#4a4634"
set -g pane-active-border-style "fg=#d0aa56"
set -g message-style "bg=#7b3428,fg=#f3ead0"
set -g mode-style "bg=#d0aa56,fg=#0c0c0c"
